name: Run DB Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      migration_file:
        description: 'Migration file path relative to repo root'
        required: true
        default: src/db/migrations/002_kamar_kegiatan_absensi_haid.sql

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Resolve D1 database name for environment
        id: vars
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "db=santrivora-db" >> "$GITHUB_OUTPUT"
          else
            echo "db=santrivora-db-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Run migration against remote D1 (${{ inputs.environment }})
        run: npx wrangler d1 execute ${{ steps.vars.outputs.db }} --env ${{ inputs.environment }} --remote --file=${{ inputs.migration_file }} -y
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
